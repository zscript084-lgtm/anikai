<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NeizPirateSitex2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080000;--bg2:#100505;--bg3:#180a0a;--accent:#e81c1c;--text:#f2eded;--muted:#7a6666;--border:#2a1010}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(8,0,0,.95);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;padding:0 32px}
.logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--text)}
main{padding:100px 32px 80px}
.st{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.st::before{content:'';width:4px;height:24px;background:var(--accent)}
.grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:translateY(-5px);border-color:var(--accent)}
.card-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.card-body{padding:12px}
.card-title{font-size:14px;font-weight:700;line-height:1.4;height:40px;overflow:hidden}
.error-box{text-align:center;padding:60px 20px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)}
.btn-r{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:5px;cursor:pointer;font-weight:700;margin-top:20px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav><div class="logo">NEIZ<span>PIRATE</span>X2</div></nav>
<main>
<div class="st">🔥 Popular Anime</div>
<div id="content">
<div class="spinner"></div>
</div>
</main>
<script>
async function loadHome() {
const container = document.getElementById('content');
try {
const response = await fetch('https://api.jikan.moe/v4/top/anime?filter=bypopularity&limit=15');
if (!response.ok) throw new Error('API limit reached. Wait 1 min.');
const data = await response.json();
const list = data.data || [];
container.innerHTML = `<div class="grid">${list.map(a => `
<div class="card" onclick="window.open('${a.url}', '_blank')">
<img class="card-img" src="${a.images.jpg.large_image_url}" alt="${a.title}">
<div class="card-body">
<div class="card-title">${a.title}</div>
</div>
</div>`).join('')}</div>`;
} catch (e) {
container.innerHTML = `
<div class="error-box">
<h3 style="color:var(--accent)">Connection Error</h3>
<p>${e.message}</p>
<p style="font-size:13px;margin-top:10px;color:var(--muted)">Your browser or network is still blocking the data.</p>
<button class="btn-r" onclick="location.reload()">Try Again</button>
</div>`;
}
}
loadHome();
</script>
</body>
</html>
