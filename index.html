<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NEIZPIRATEX2 - GogoStream</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
:root{--bg:#0b0b0b;--bg2:#161616;--accent:#ffc107;--red:#e91e63;--text:#eee;--border:#222}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;line-height:1.5}
nav{background:#000;border-bottom:2px solid var(--red);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--red);cursor:pointer;letter-spacing:1px}
.logo span{color:#fff}
.search-box{background:#222;border:none;padding:8px 15px;color:#fff;border-radius:20px;outline:none;width:200px;font-family:inherit}
main{padding:20px;max-width:1200px;margin:0 auto}
.section-title{font-family:'Bebas Neue',cursive;font-size:24px;margin-bottom:20px;color:var(--accent);display:flex;align-items:center;gap:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}
.card{background:var(--bg2);border-radius:5px;overflow:hidden;cursor:pointer;transition:0.2s;position:relative;border:1px solid var(--border)}
.card:hover{transform:scale(1.03);border-color:var(--red)}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover}
.card-info{padding:10px}
.card-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-ep{position:absolute;top:5px;right:5px;background:var(--red);color:#fff;padding:2px 6px;font-size:12px;font-weight:700;border-radius:3px}
#player-view{display:none}
.player-wrapper{background:#000;width:100%;aspect-ratio:16/9;margin-bottom:20px}
video{width:100%;height:100%}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:8px;margin-top:15px}
.ep-btn{background:var(--bg2);border:1px solid var(--border);color:#fff;padding:10px;cursor:pointer;text-align:center;font-weight:700;border-radius:4px}
.ep-btn:hover,.ep-btn.active{background:var(--red);border-color:var(--red)}
.loader{text-align:center;padding:50px;font-size:20px;color:var(--accent)}
.error{background:rgba(233,30,99,0.1);border:1px solid var(--red);padding:20px;text-align:center;border-radius:5px}
</style>
</head>
<body>

<nav>
<div class="logo" onclick="location.reload()">NEIZ<span>PIRATE</span></div>
<input type="text" class="search-box" id="search" placeholder="Search anime...">
</nav>

<main>
<div id="home-view">
<div class="section-title">✨ Recent Releases</div>
<div id="recent-grid" class="grid"></div>
</div>

<div id="player-view">
<div id="anime-header" style="margin-bottom:15px">
<h2 id="p-title"></h2>
<p id="p-ep" style="color:var(--accent)"></p>
</div>
<div class="player-wrapper">
<video id="video" controls></video>
</div>
<div class="section-title">Episodes</div>
<div id="ep-list" class="ep-grid"></div>
</div>
</main>

<script>
const API = "https://api.consumet.org/anime/gogoanime/";
const hls = new Hls();

async function proxyFetch(url) {
try {
const r = await fetch(url);
if(!r.ok) throw new Error();
return await r.json();
} catch {
const p = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
const r = await fetch(p);
const j = await r.json();
return JSON.parse(j.contents);
}
}

async function loadRecent() {
const grid = document.getElementById('recent-grid');
grid.innerHTML = '<div class="loader">Loading latest episodes...</div>';
try {
const data = await proxyFetch(API + "recent-episodes");
grid.innerHTML = data.results.map(a => `
<div class="card" onclick="playAnime('${a.id}', '${a.episodeNumber}')">
<div class="card-ep">EP ${a.episodeNumber}</div>
<img src="${a.image}">
<div class="card-info"><div class="card-title">${a.title}</div></div>
</div>`).join('');
} catch (e) {
grid.innerHTML = '<div class="error">Failed to load. Try disabling Ad-Block or use a VPN.</div>';
}
}

async function searchAnime(q) {
document.getElementById('home-view').style.display = 'block';
document.getElementById('player-view').style.display = 'none';
const grid = document.getElementById('recent-grid');
document.querySelector('.section-title').textContent = "Search Results: " + q;
grid.innerHTML = '<div class="loader">Searching...</div>';
const data = await proxyFetch(API + encodeURIComponent(q));
grid.innerHTML = data.results.map(a => `
<div class="card" onclick="loadDetails('${a.id}')">
<img src="${a.image}">
<div class="card-info"><div class="card-title">${a.title}</div></div>
</div>`).join('');
}

async function loadDetails(id) {
const info = await proxyFetch(API + "info/" + id);
showPlayer(info, info.episodes[0].id, 1);
}

async function playAnime(id, epNum) {
const info = await proxyFetch(API + "info/" + id);
showPlayer(info, id + "-episode-" + epNum, epNum);
}

function showPlayer(info, epId, epNum) {
document.getElementById('home-view').style.display = 'none';
document.getElementById('player-view').style.display = 'block';
document.getElementById('p-title').textContent = info.title;
document.getElementById('p-ep').textContent = "Playing Episode " + epNum;

document.getElementById('ep-list').innerHTML = info.episodes.map(e => `
<div class="ep-btn ${e.number == epNum ? 'active' : ''}" onclick="switchEp('${info.id}', '${e.id}', '${e.number}')">${e.number}</div>
`).join('');

loadStream(epId);
}

async function loadStream(epId) {
const data = await proxyFetch(API + "watch/" + epId);
const src = data.sources.find(s => s.quality === 'default' || s.quality === '720p') || data.sources[0];
const video = document.getElementById('video');

if (Hls.isSupported()) {
hls.loadSource(src.url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
} else {
video.src = src.url;
video.play();
}
}

function switchEp(animeId, epId, num) {
document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
document.getElementById('p-ep').textContent = "Playing Episode " + num;
loadStream(epId);
}

document.getElementById('search').onkeydown = e => {
if(e.key === 'Enter') searchAnime(e.target.value);
};

loadRecent();
</script>
</body>
</html>
