<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NeizPirateSitex2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080000;--bg2:#100505;--bg3:#180a0a;--bg4:#200d0d;--accent:#e81c1c;--accent2:#ff4444;--gold:#f5c518;--text:#f2eded;--muted:#7a6666;--border:#2a1010;--card:#100505}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(8,0,0,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);height:64px;display:flex;align-items:center;padding:0 32px;gap:24px}
.logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px;color:var(--accent);flex-shrink:0;cursor:pointer;transition:.2s}
.logo:hover{color:var(--accent2)}
.logo span{color:var(--text)}
.nav-tabs{display:flex;gap:2px;flex:1}
.ntab{padding:8px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:6px;transition:.2s}
.ntab:hover{color:var(--text);background:var(--bg3)}
.ntab.on{color:var(--accent);background:rgba(232,28,28,.1)}
.nsearch{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;transition:.2s}
.nsearch:focus-within{border-color:var(--accent)}
.nsearch input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;width:200px}
.nsearch input::placeholder{color:var(--muted)}
.updated-badge{font-size:10px;color:var(--muted);letter-spacing:1px;white-space:nowrap}
.hero{height:520px;position:relative;margin-top:64px;overflow:hidden;display:flex;align-items:flex-end}
.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:saturate(1.2) contrast(1.1);transition:opacity .8s}
.hero-veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,0,0,.05) 0%,rgba(8,0,0,.98) 100%),linear-gradient(90deg,rgba(8,0,0,.95) 0%,rgba(8,0,0,.3) 55%,transparent 100%)}
.hero-body{position:relative;z-index:2;padding:48px 52px;max-width:660px}
.hero-pill{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:4px 12px;border-radius:3px;margin-bottom:14px}
.hero-title{font-family:'Bebas Neue',cursive;font-size:60px;line-height:1;letter-spacing:2px;margin-bottom:12px;text-shadow:0 2px 24px rgba(0,0,0,.8)}
.hero-meta{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.hero-score{color:var(--gold);font-size:16px;font-weight:700}
.hero-tag{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:3px 10px;border-radius:3px;font-size:11px;color:#b8a8a8;font-weight:600}
.hero-desc{font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.9;color:#9a8888;margin-bottom:24px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-dots{position:absolute;bottom:20px;right:48px;z-index:2;display:flex;gap:6px}
.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;transition:.2s}
.hero-dot.on{background:var(--accent);width:24px;border-radius:4px}
.btns{display:flex;gap:12px}
.btn-r{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;padding:12px 28px;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:.2s}
.btn-r:hover{background:#c41515;transform:translateY(-1px)}
.btn-g{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.15);cursor:pointer;padding:12px 28px;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:.2s}
.btn-g:hover{background:rgba(255,255,255,.12)}
main{padding:0 32px 80px}
.section{margin-top:44px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.st{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;display:flex;align-items:center;gap:10px}
.st::before{content:'';display:block;width:4px;height:20px;background:var(--accent);border-radius:2px}
.sa{background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.2s}
.sa:hover{color:var(--accent2)}
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.25s;position:relative}
.card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 8px 32px rgba(232,28,28,.2)}
.card-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--bg3);display:block}
.card-ep{position:absolute;top:8px;left:8px;background:rgba(8,0,0,.85);border:1px solid var(--border);padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px}
.card-sub{position:absolute;top:8px;right:8px;background:rgba(232,28,28,.9);color:#fff;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px}
.card-body{padding:10px 12px}
.card-title{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.card-score{color:var(--gold);font-size:12px;font-weight:700}
.card-type{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--bg3);padding:2px 6px;border-radius:3px}
.two-col{display:grid;grid-template-columns:1fr 320px;gap:28px}
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;gap:12px;align-items:center;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:.2s}
.rank-item:hover{border-color:var(--accent);transform:translateX(3px)}
.rank-n{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--border);min-width:32px;text-align:center}
.rank-item:nth-child(1) .rank-n{color:var(--gold)}
.rank-item:nth-child(2) .rank-n{color:#c0c8d0}
.rank-item:nth-child(3) .rank-n{color:#cd7f32}
.rank-img{width:40px;height:56px;object-fit:cover;border-radius:5px;background:var(--bg3);flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.rank-sub{font-size:11px;color:var(--muted);display:flex;gap:8px}
.sched-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto}
.sched-list::-webkit-scrollbar{width:3px}
.sched-list::-webkit-scrollbar-track{background:var(--bg3)}
.sched-list::-webkit-scrollbar-thumb{background:var(--accent)}
.sched-item{display:flex;gap:10px;align-items:center;padding:8px 10px;background:var(--bg3);border-radius:6px;cursor:pointer;transition:.2s;border-left:3px solid transparent}
.sched-item:hover{background:var(--bg4);border-left-color:var(--accent)}
.sched-time{font-size:11px;font-weight:700;color:var(--accent);min-width:52px;letter-spacing:.5px}
.sched-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-ep{font-size:10px;color:var(--muted)}
.view{display:none}
.view.on{display:block}
.detail-hero{position:relative;height:400px;overflow:hidden;margin-top:64px}
.detail-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:blur(2px) saturate(1.2)}
.detail-veil{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg) 0%,rgba(8,0,0,.6) 100%)}
.detail-thumb{position:absolute;bottom:-40px;left:48px;width:120px;height:170px;object-fit:cover;border-radius:8px;border:2px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.8)}
.detail-meta{position:absolute;bottom:10px;left:192px;right:48px}
.detail-title{font-family:'Bebas Neue',cursive;font-size:42px;line-height:1;letter-spacing:2px;margin-bottom:8px;text-shadow:0 2px 12px rgba(0,0,0,.9)}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px}
.detail-tag{padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.5px;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.detail-body{padding:60px 48px 48px}
.detail-grid{display:grid;grid-template-columns:1fr 280px;gap:32px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.stat-val{font-size:20px;font-weight:700;margin-bottom:2px}
.stat-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.detail-synopsis{font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.95;color:#9a8888;margin-bottom:20px}
.genre-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.gpill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(232,28,28,.12);border:1px solid rgba(232,28,28,.25);color:var(--accent)}
.ep-section-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.ep-section-title::before{content:'';display:block;width:3px;height:18px;background:var(--accent);border-radius:2px}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;max-height:340px;overflow-y:auto;padding-right:4px}
.ep-grid::-webkit-scrollbar{width:3px}
.ep-grid::-webkit-scrollbar-track{background:var(--bg3)}
.ep-grid::-webkit-scrollbar-thumb{background:var(--accent)}
.ep-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 4px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;text-align:center}
.ep-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.ep-btn.current{background:var(--accent);border-color:var(--accent);color:#fff}
.watch-view{padding-top:64px}
.player-wrap{background:#000;width:100%;aspect-ratio:16/9;position:relative}
.player-wrap video{width:100%;height:100%;display:block}
.player-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);flex-direction:column;gap:12px}
.player-overlay.hidden{display:none}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.player-msg{font-size:13px;color:var(--muted)}
.watch-grid{display:grid;grid-template-columns:1fr 300px;gap:0;max-height:calc(100vh - 100px)}
.watch-player-side{overflow-y:auto}
.watch-info{padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.watch-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1.5px;margin-bottom:4px}
.watch-ep-label{font-size:13px;color:var(--muted);font-weight:600}
.watch-ep-side{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ep-side-head{padding:14px 16px;border-bottom:1px solid var(--border);font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1.5px;display:flex;justify-content:space-between;align-items:center}
.ep-side-scroll{overflow-y:auto;flex:1}
.ep-side-scroll::-webkit-scrollbar{width:3px}
.ep-side-scroll::-webkit-scrollbar-thumb{background:var(--accent)}
.ep-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;align-items:center}
.ep-row:hover{background:var(--bg3)}
.ep-row.current{background:rgba(232,28,28,.1);border-left:3px solid var(--accent)}
.ep-row-num{font-size:11px;font-weight:700;color:var(--muted);min-width:28px}
.ep-row-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.search-view{padding:80px 32px 80px}
.search-big{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:28px;transition:.2s}
.search-big:focus-within{border-color:var(--accent)}
.search-big input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:20px}
.search-big input::placeholder{color:var(--muted)}
.search-label{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1.5px;margin-bottom:18px;color:var(--muted)}
.skeleton{background:var(--bg3);border-radius:10px;animation:pulse 1.4s ease-in-out infinite}
.skeleton-card{aspect-ratio:3/4}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.source-picker{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:12px}
.source-picker h4{font-size:14px;font-weight:700;letter-spacing:1px;margin-bottom:12px;color:var(--muted)}
.source-btn{display:block;width:100%;text-align:left;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:6px;transition:.2s}
.source-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.error-box{padding:60px 20px;text-align:center;color:var(--muted)}
.error-icon{font-size:48px;margin-bottom:12px}
.error-box h3{font-size:20px;color:var(--text);margin-bottom:6px}
.error-box p{font-size:13px}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;margin-bottom:0}
.back-btn:hover{background:var(--bg4);border-color:var(--accent)}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:.2s}
.filter-btn:hover,.filter-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
@media(max-width:900px){.two-col{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr}.watch-grid{grid-template-columns:1fr}.watch-ep-side{max-height:300px}.hero{height:400px}.hero-body{padding:28px}.hero-title{font-size:38px}.detail-thumb{width:80px;height:112px;left:20px}.detail-meta{left:120px;right:20px}.detail-body{padding:50px 20px 40px}.detail-stats{grid-template-columns:repeat(2,1fr)}main{padding:0 16px 80px}nav{padding:0 16px}.nsearch input{width:130px}}
</style>
</head>
<body>
<nav>
  <div class="logo" id="logoBtn">NEIZ<span>PIRATE</span>X2</div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="nsearch">
    <span style="font-size:13px;color:var(--muted)">⌕</span>
    <input id="navSearchInput" type="text" placeholder="Search anime..."/>
  </div>
  <div class="updated-badge" id="updatedBadge"></div>
</nav>

<div id="homeView" class="view on">
  <div class="hero" id="heroEl">
    <img class="hero-bg" id="heroBgImg" src="" alt=""/>
    <div class="hero-veil"></div>
    <div class="hero-body">
      <div class="hero-pill">⚡ Trending Now</div>
      <div class="hero-title" id="heroTitle">Loading...</div>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-desc" id="heroDesc"></div>
      <div class="btns">
        <button class="btn-r" id="heroWatchBtn">▶ Watch Now</button>
        <button class="btn-g" id="heroInfoBtn">ℹ Info</button>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>
  <main>
    <div class="two-col">
      <div>
        <div class="section">
          <div class="sh"><div class="st">🔥 Trending</div></div>
          <div class="grid" id="trendingGrid"><div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(5,1fr);gap:14px"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div></div>
        </div>
        <div class="section">
          <div class="sh"><div class="st">🌸 This Season</div></div>
          <div class="grid" id="seasonGrid"><div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(5,1fr);gap:14px"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div></div>
        </div>
        <div class="section">
          <div class="sh"><div class="st">⭐ Most Popular</div></div>
          <div class="grid" id="popularGrid"><div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(5,1fr);gap:14px"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div></div>
        </div>
      </div>
      <div>
        <div class="section">
          <div class="sh"><div class="st">🏆 Top Rated</div></div>
          <div class="rank-list" id="topRatedList"></div>
        </div>
        <div class="section" style="margin-top:28px">
          <div class="sh"><div class="st">📅 Airing Today</div></div>
          <div class="sched-list" id="schedList"><div class="skeleton" style="height:200px;border-radius:8px"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="searchView" class="view">
  <div class="search-view">
    <div class="search-big">
      <span style="font-size:18px;color:var(--muted)">⌕</span>
      <input id="searchBigInput" type="text" placeholder="Search for any anime..."/>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn on" data-type="">All</button>
      <button class="filter-btn" data-type="TV">TV</button>
      <button class="filter-btn" data-type="MOVIE">Movie</button>
      <button class="filter-btn" data-type="OVA">OVA</button>
      <button class="filter-btn" data-type="SPECIAL">Special</button>
    </div>
    <div class="search-label" id="searchLabel">Start typing to search...</div>
    <div class="grid" id="searchGrid"></div>
  </div>
</div>

<div id="topView" class="view">
  <main style="padding-top:88px">
    <div class="sh" style="margin-bottom:18px"><div class="st">🏆 All Time Top Anime</div></div>
    <div class="grid" id="topAllGrid"></div>
  </main>
</div>

<div id="detailView" class="view">
  <div class="detail-hero">
    <img class="detail-bg" id="detailBg" src="" alt=""/>
    <div class="detail-veil"></div>
    <img class="detail-thumb" id="detailThumb" src="" alt=""/>
    <div class="detail-meta">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-tags" id="detailTags"></div>
    </div>
  </div>
  <div class="detail-body">
    <div style="margin-bottom:20px">
      <button class="back-btn" onclick="goHome()">← Back</button>
    </div>
    <div class="detail-grid">
      <div>
        <div class="detail-stats" id="detailStats"></div>
        <div class="genre-pills" id="detailGenres"></div>
        <div class="detail-synopsis" id="detailSynopsis"></div>
        <div id="detailEpisodes"></div>
      </div>
      <div id="detailSidebar"></div>
    </div>
  </div>
</div>

<div id="watchView" class="view">
  <div class="watch-view">
    <div style="padding:8px 16px;display:flex;align-items:center;gap:12px;background:var(--bg2);border-bottom:1px solid var(--border)">
      <button class="back-btn" id="watchBackBtn">← Back</button>
      <span style="font-size:13px;color:var(--muted)" id="watchBreadcrumb"></span>
    </div>
    <div class="watch-grid">
      <div class="watch-player-side">
        <div class="player-wrap">
          <video id="videoPlayer" controls></video>
          <div class="player-overlay" id="playerOverlay">
            <div class="spinner"></div>
            <div class="player-msg" id="playerMsg">Finding stream...</div>
          </div>
        </div>
        <div class="watch-info">
          <div class="watch-title" id="watchTitle"></div>
          <div class="watch-ep-label" id="watchEpLabel"></div>
          <div id="sourcePickerArea"></div>
        </div>
      </div>
      <div class="watch-ep-side">
        <div class="ep-side-head">
          <span>Episodes</span>
          <span style="font-size:11px;color:var(--muted)" id="epSideCount"></span>
        </div>
        <div class="ep-side-scroll" id="epSideScroll"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ANILIST='https://graphql.anilist.co';
const JIKAN='https://api.jikan.moe/v4';
const CONSUMET_HOSTS=[
  'https://consumet-api.onrender.com',
  'https://api.consumet.org'
];
const REFRESH_MS=30*60*1000;
const cache={};
let heroList=[];
let heroIdx=0;
let heroTimer=null;
let activeConsumer=null;
let currentAnime=null;
let currentEpisodes=[];
let currentEpIdx=0;
let hlsInstance=null;
let jikanQueue=[];
let jikanRunning=false;
let filterType='';
let searchDebounce=null;
let lastUpdated=null;

function jikanEnqueue(fn){
  return new Promise((res,rej)=>{
    jikanQueue.push({fn,res,rej});
    if(!jikanRunning)jikanDrain();
  });
}
async function jikanDrain(){
  jikanRunning=true;
  while(jikanQueue.length){
    const {fn,res,rej}=jikanQueue.shift();
    try{res(await fn())}catch(e){rej(e)}
    await sleep(400);
  }
  jikanRunning=false;
}

async function anilistQuery(query,vars={}){
  const key=JSON.stringify({query,vars});
  if(cache[key]&&Date.now()-cache[key].t<REFRESH_MS)return cache[key].d;
  const r=await fetch(ANILIST,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({query,variables:vars})});
  const d=await r.json();
  cache[key]={d:d.data,t:Date.now()};
  return d.data;
}

async function jikanGet(path){
  return jikanEnqueue(async()=>{
    const r=await fetch(JIKAN+path);
    if(!r.ok)throw new Error('Jikan '+r.status);
    return r.json();
  });
}

async function detectConsumer(){
  if(activeConsumer)return activeConsumer;
  for(const h of CONSUMET_HOSTS){
    try{
      const r=await fetch(h+'/anime/gogoanime/naruto?page=1',{signal:AbortSignal.timeout(6000)});
      if(r.ok){activeConsumer=h;return h;}
    }catch(e){}
  }
  return null;
}

async function consumetSearch(title){
  const h=await detectConsumer();
  if(!h)return null;
  try{
    const q=encodeURIComponent(title);
    const r=await fetch(`${h}/anime/gogoanime/${q}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}

async function consumetInfo(id){
  const h=await detectConsumer();
  if(!h)return null;
  try{
    const r=await fetch(`${h}/anime/gogoanime/info/${encodeURIComponent(id)}`,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}

async function consumetWatch(epId){
  const h=await detectConsumer();
  if(!h)return null;
  try{
    const r=await fetch(`${h}/anime/gogoanime/watch/${encodeURIComponent(epId)}`,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(n){if(!n)return'—';return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':n}
function stripHtml(s){return s?s.replace(/<[^>]*>/g,'').replace(/&[a-z]+;/gi,' ').trim():''}

const AL_FRAGMENT=`id title{romaji english} coverImage{large extraLarge} bannerImage episodes status season seasonYear score:meanScore popularity genres type format`;

const TREND_QUERY=`query($page:Int){Page(page:$page,perPage:20){media(sort:TRENDING_DESC,type:ANIME,status_in:[RELEASING,FINISHED],isAdult:false){${AL_FRAGMENT}}}}`;
const POP_QUERY=`query($page:Int){Page(page:$page,perPage:16){media(sort:POPULARITY_DESC,type:ANIME,isAdult:false){${AL_FRAGMENT}}}}`;
const SEASON_QUERY=`query($season:MediaSeason,$year:Int){Page(perPage:16){media(season:$season,seasonYear:$year,type:ANIME,sort:POPULARITY_DESC,isAdult:false){${AL_FRAGMENT}}}}`;
const TOP_QUERY=`query($page:Int){Page(page:$page,perPage:24){media(sort:SCORE_DESC,type:ANIME,isAdult:false){${AL_FRAGMENT}}}}`;
const SEARCH_QUERY=`query($q:String,$format:MediaFormat){Page(perPage:24){media(search:$q,type:ANIME,format:$format,isAdult:false,sort:POPULARITY_DESC){${AL_FRAGMENT}}}}`;
const DETAIL_QUERY=`query($id:Int){Media(id:$id,type:ANIME){${AL_FRAGMENT} description synonyms studios{nodes{name}} startDate{year month day} endDate{year month day} trailer{site id} nextAiringEpisode{episode timeUntilAiring}}}`;

function getSeason(){
  const m=new Date().getMonth();
  const seasons=['WINTER','WINTER','SPRING','SPRING','SPRING','SUMMER','SUMMER','SUMMER','FALL','FALL','FALL','WINTER'];
  return{season:seasons[m],year:new Date().getFullYear()};
}

function animeCard(a,showSub=true){
  const img=a.coverImage?.large||a.coverImage?.extraLarge||'';
  const score=a.score?'★ '+(a.score/10).toFixed(1):'—';
  const eps=a.episodes?a.episodes+'ep':(a.status==='RELEASING'?'Ongoing':'?');
  const type=a.format||a.type||'';
  return `<div class="card" onclick="openDetail(${a.id})">
    <span class="card-ep">${eps}</span>
    ${showSub?'<span class="card-sub">SUB</span>':''}
    ${img?`<img class="card-img" src="${esc(img)}" alt="${esc(a.title?.romaji)}" loading="lazy"/>`:`<div class="card-img" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:32px">🎬</div>`}
    <div class="card-body">
      <div class="card-title">${esc(a.title?.english||a.title?.romaji)}</div>
      <div class="card-foot">
        <div class="card-score">${score}</div>
        ${type?`<div class="card-type">${esc(type)}</div>`:''}
      </div>
    </div>
  </div>`;
}

function rankItem(a,i){
  const img=a.coverImage?.large||'';
  const score=a.score?'★ '+(a.score/10).toFixed(1):'—';
  return `<div class="rank-item" onclick="openDetail(${a.id})">
    <div class="rank-n">${String(i+1).padStart(2,'0')}</div>
    ${img?`<img class="rank-img" src="${esc(img)}" alt="" loading="lazy"/>`:`<div class="rank-img"></div>`}
    <div class="rank-info">
      <div class="rank-title">${esc(a.title?.english||a.title?.romaji)}</div>
      <div class="rank-sub"><span>${a.format||'?'}</span><span style="color:var(--gold)">${score}</span></div>
    </div>
  </div>`;
}

function setHero(list){
  heroList=list.filter(a=>a.bannerImage||a.coverImage?.extraLarge);
  heroIdx=0;
  buildHeroDots();
  renderHero(0);
  if(heroTimer)clearInterval(heroTimer);
  heroTimer=setInterval(()=>{heroIdx=(heroIdx+1)%Math.min(heroList.length,8);renderHero(heroIdx);},6000);
}

function renderHero(i){
  const a=heroList[i];
  if(!a)return;
  const bg=a.bannerImage||a.coverImage?.extraLarge||'';
  document.getElementById('heroBgImg').src=bg;
  document.getElementById('heroTitle').textContent=a.title?.english||a.title?.romaji||'';
  document.getElementById('heroBgImg').style.opacity='0';
  setTimeout(()=>document.getElementById('heroBgImg').style.opacity='1',50);
  const score=a.score?'★ '+(a.score/10).toFixed(1):'';
  document.getElementById('heroMeta').innerHTML=`
    ${score?`<div class="hero-score">${score}</div>`:''}
    ${a.seasonYear?`<span class="hero-tag">${a.seasonYear}</span>`:''}
    ${a.format?`<span class="hero-tag">${a.format}</span>`:''}
    ${a.episodes?`<span class="hero-tag">${a.episodes} Episodes</span>`:'<span class="hero-tag">Ongoing</span>'}
    ${a.status==='RELEASING'?`<span class="hero-tag" style="color:var(--accent);border-color:var(--accent)">Airing</span>`:''}
  `;
  document.getElementById('heroDesc').textContent='';
  document.getElementById('heroWatchBtn').onclick=()=>openDetail(a.id);
  document.getElementById('heroInfoBtn').onclick=()=>openDetail(a.id);
  document.querySelectorAll('.hero-dot').forEach((d,di)=>d.classList.toggle('on',di===i));
}

function buildHeroDots(){
  const ct=document.getElementById('heroDots');
  ct.innerHTML='';
  Math.min(heroList.length,8);
  for(let i=0;i<Math.min(heroList.length,8);i++){
    const d=document.createElement('button');
    d.className='hero-dot'+(i===0?' on':'');
    d.onclick=()=>{heroIdx=i;renderHero(i);};
    ct.appendChild(d);
  }
}

const TABS=[{id:'home',label:'Home'},{id:'search',label:'Search'},{id:'top',label:'Top Anime'}];
let activeTab='home';

function buildNav(){
  const ct=document.getElementById('navTabs');
  ct.innerHTML='';
  TABS.forEach(t=>{
    const b=document.createElement('button');
    b.className='ntab'+(t.id==='home'?' on':'');
    b.textContent=t.label;
    b.onclick=()=>switchTab(t.id);
    ct.appendChild(b);
  });
}

function switchTab(id){
  activeTab=id;
  document.querySelectorAll('.ntab').forEach((b,i)=>b.classList.toggle('on',TABS[i].id===id));
  showView(id==='home'?'homeView':id==='search'?'searchView':id==='top'?'topView':'homeView');
  if(id==='search')document.getElementById('searchBigInput').focus();
  if(id==='top'&&!document.getElementById('topAllGrid').innerHTML)loadTopAll();
  window.scrollTo(0,0);
}

function showView(id){
  ['homeView','searchView','topView','detailView','watchView'].forEach(v=>{
    const el=document.getElementById(v);
    if(el)el.className='view'+(v===id?' on':'');
  });
}

function goHome(){
  switchTab('home');
}

document.getElementById('logoBtn').onclick=()=>{goHome();};

document.getElementById('navSearchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.value.trim()){
    switchTab('search');
    document.getElementById('searchBigInput').value=e.target.value.trim();
    doSearch(e.target.value.trim());
  }
});

document.getElementById('searchBigInput').addEventListener('input',e=>{
  clearTimeout(searchDebounce);
  const v=e.target.value.trim();
  if(v.length>=2)searchDebounce=setTimeout(()=>doSearch(v),500);
  else if(!v){document.getElementById('searchGrid').innerHTML='';document.getElementById('searchLabel').textContent='Start typing to search...';}
});

document.getElementById('searchBigInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){clearTimeout(searchDebounce);doSearch(e.target.value.trim());}
});

document.querySelectorAll('.filter-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    filterType=b.dataset.type;
    const v=document.getElementById('searchBigInput').value.trim();
    if(v.length>=2)doSearch(v);
  };
});

async function doSearch(q){
  if(!q)return;
  document.getElementById('searchLabel').textContent=`Results for "${q}"`;
  document.getElementById('searchGrid').innerHTML='<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:60px"><div class="spinner"></div></div>';
  try{
    const vars={q};
    if(filterType)vars.format=filterType;
    const d=await anilistQuery(SEARCH_QUERY,vars);
    const list=(d?.Page?.media)||[];
    if(!list.length){
      document.getElementById('searchGrid').innerHTML='<div class="error-box" style="grid-column:1/-1"><div class="error-icon">🔍</div><h3>No results</h3><p>Try a different search term</p></div>';
    }else{
      document.getElementById('searchGrid').innerHTML=list.map(a=>animeCard(a)).join('');
    }
  }catch(e){
    document.getElementById('searchGrid').innerHTML='<div class="error-box" style="grid-column:1/-1"><div class="error-icon">⚠️</div><h3>Search failed</h3><p>Check your connection</p></div>';
  }
}

async function loadTopAll(){
  document.getElementById('topAllGrid').innerHTML='<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:80px"><div class="spinner"></div></div>';
  try{
    const d=await anilistQuery(TOP_QUERY,{page:1});
    document.getElementById('topAllGrid').innerHTML=(d?.Page?.media||[]).map(a=>animeCard(a)).join('');
  }catch(e){
    document.getElementById('topAllGrid').innerHTML='<div class="error-box" style="grid-column:1/-1"><div class="error-icon">⚠️</div><h3>Failed to load</h3><p>Try refreshing</p></div>';
  }
}

async function openDetail(id){
  showView('detailView');
  window.scrollTo(0,0);
  currentAnime=null;
  currentEpisodes=[];
  document.getElementById('detailTitle').textContent='Loading...';
  document.getElementById('detailBg').src='';
  document.getElementById('detailThumb').src='';
  document.getElementById('detailTags').innerHTML='';
  document.getElementById('detailStats').innerHTML='';
  document.getElementById('detailGenres').innerHTML='';
  document.getElementById('detailSynopsis').textContent='';
  document.getElementById('detailEpisodes').innerHTML='<div class="spinner" style="margin:20px auto"></div>';
  document.getElementById('detailSidebar').innerHTML='';
  try{
    const d=await anilistQuery(DETAIL_QUERY,{id});
    const a=d?.Media;
    if(!a)throw new Error('Not found');
    currentAnime=a;
    const bg=a.bannerImage||a.coverImage?.extraLarge||'';
    const thumb=a.coverImage?.large||a.coverImage?.extraLarge||'';
    document.getElementById('detailBg').src=bg;
    document.getElementById('detailThumb').src=thumb;
    document.getElementById('detailTitle').textContent=a.title?.english||a.title?.romaji||'';
    document.getElementById('detailTags').innerHTML=[
      a.format&&`<div class="detail-tag">${a.format}</div>`,
      a.status&&`<div class="detail-tag">${a.status.replace('_',' ')}</div>`,
      a.seasonYear&&`<div class="detail-tag">${a.season||''} ${a.seasonYear}</div>`,
    ].filter(Boolean).join('');
    const score=a.score?'★ '+(a.score/10).toFixed(1):'—';
    document.getElementById('detailStats').innerHTML=[
      {v:score,l:'Score'},
      {v:a.episodes||'?',l:'Episodes'},
      {v:fmt(a.popularity),l:'Popularity'},
      {v:a.nextAiringEpisode?'Ep '+a.nextAiringEpisode.episode:a.status==='FINISHED'?'Finished':'?',l:a.status==='RELEASING'?'Next Ep':'Status'},
    ].map(s=>`<div class="stat-box"><div class="stat-val">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');
    document.getElementById('detailGenres').innerHTML=(a.genres||[]).map(g=>`<span class="gpill">${esc(g)}</span>`).join('');
    document.getElementById('detailSynopsis').textContent=stripHtml(a.description)||'No description available.';
    renderDetailSidebar(a);
    await loadEpisodes(a);
  }catch(e){
    document.getElementById('detailEpisodes').innerHTML='<div class="error-box"><div class="error-icon">⚠️</div><h3>Failed to load</h3><p>'+e.message+'</p></div>';
  }
}

function renderDetailSidebar(a){
  const sd=document.getElementById('detailSidebar');
  const start=a.startDate?.year?`${a.startDate.year}/${a.startDate.month||'?'}/${a.startDate.day||'?'}`:'Unknown';
  const studio=a.studios?.nodes?.[0]?.name||'Unknown';
  sd.innerHTML=`
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px">
      <div style="font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1.5px;margin-bottom:14px;color:var(--muted)">Details</div>
      ${row('Studio',studio)}
      ${row('Start Date',start)}
      ${row('Format',a.format||'?')}
      ${row('Episodes',a.episodes||'?')}
      ${row('Status',a.status?.replace('_',' ')||'?')}
      ${row('Season',(a.season||'?')+' '+(a.seasonYear||''))}
    </div>
  `;
}
function row(l,v){return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--muted)">${l}</span><span style="font-weight:600;text-align:right;max-width:160px">${esc(String(v))}</span></div>`;}

async function loadEpisodes(a){
  const title=a.title?.english||a.title?.romaji||'';
  document.getElementById('detailEpisodes').innerHTML='<div class="ep-section-title">Episodes</div><div style="color:var(--muted);font-size:13px;padding:8px 0">Searching streams...</div>';
  const result=await consumetSearch(title);
  if(!result||!result.results?.length){
    const altTitle=a.title?.romaji||a.title?.english||'';
    const alt=altTitle!==title?await consumetSearch(altTitle):null;
    if(!alt||!alt.results?.length){
      renderNoEpisodes(a);
      return;
    }
    renderEpisodeSourcePicker(a,alt.results);
    return;
  }
  if(result.results.length===1){
    await fetchAndRenderEpisodes(a,result.results[0].id,result.results[0].title||title);
    return;
  }
  renderEpisodeSourcePicker(a,result.results);
}

function renderNoEpisodes(a){
  document.getElementById('detailEpisodes').innerHTML=`
    <div class="ep-section-title">Episodes</div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:8px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Stream source not found automatically. Try searching manually:</div>
      <button class="btn-r" style="padding:10px 20px;font-size:13px" onclick="window.open('https://anikai.to/search?q=${encodeURIComponent(a.title?.english||a.title?.romaji||'')}','_blank')">▶ Watch on AnimeKai</button>
    </div>
  `;
}

function renderEpisodeSourcePicker(a,sources){
  const list=sources.slice(0,8).map(s=>`<button class="source-btn" onclick="fetchAndRenderEpisodes(window._ca,'${esc(s.id)}','${esc(s.title||s.id)}')">${esc(s.title||s.id)}</button>`).join('');
  document.getElementById('detailEpisodes').innerHTML=`
    <div class="ep-section-title">Episodes</div>
    <div class="source-picker">
      <h4>Multiple matches found — select the correct one:</h4>
      ${list}
    </div>
  `;
  window._ca=a;
}

async function fetchAndRenderEpisodes(a,gogoId,sourceTitle){
  window._ca=a;
  document.getElementById('detailEpisodes').innerHTML='<div class="ep-section-title">Episodes</div><div style="color:var(--muted);font-size:13px;padding:8px 0">Loading episodes...</div>';
  const info=await consumetInfo(gogoId);
  if(!info||!info.episodes?.length){
    renderNoEpisodes(a);
    return;
  }
  currentEpisodes=info.episodes;
  const total=currentEpisodes.length;
  const btn=`<div class="ep-section-title">Episodes <span style="font-size:14px;color:var(--muted);font-weight:400">(${total})</span></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Source: ${esc(sourceTitle)}</div>
    <div class="ep-grid">${currentEpisodes.map((ep,i)=>`<button class="ep-btn" onclick="startWatch(${i})" title="Episode ${ep.number||i+1}">Ep ${ep.number||i+1}</button>`).join('')}</div>`;
  document.getElementById('detailEpisodes').innerHTML=btn;
}

async function startWatch(epIdx){
  if(!currentEpisodes.length)return;
  currentEpIdx=epIdx;
  const ep=currentEpisodes[epIdx];
  const title=currentAnime?.title?.english||currentAnime?.title?.romaji||'';
  showView('watchView');
  window.scrollTo(0,0);
  document.getElementById('watchTitle').textContent=title;
  document.getElementById('watchEpLabel').textContent=`Episode ${ep.number||epIdx+1}${ep.title?' — '+ep.title:''}`;
  document.getElementById('watchBreadcrumb').textContent=title+' › Episode '+(ep.number||epIdx+1);
  document.getElementById('watchBackBtn').onclick=()=>{showView('detailView');window.scrollTo(0,0);};
  document.getElementById('sourcePickerArea').innerHTML='';
  buildEpSideList();
  await loadStream(ep.id);
}

function buildEpSideList(){
  document.getElementById('epSideCount').textContent=currentEpisodes.length+' eps';
  document.getElementById('epSideScroll').innerHTML=currentEpisodes.map((ep,i)=>`
    <div class="ep-row${i===currentEpIdx?' current':''}" id="eprow${i}" onclick="switchEp(${i})">
      <div class="ep-row-num">${ep.number||i+1}</div>
      <div class="ep-row-title">${esc(ep.title||'Episode '+(ep.number||i+1))}</div>
    </div>
  `).join('');
  const cur=document.getElementById('eprow'+currentEpIdx);
  if(cur)cur.scrollIntoView({block:'center',behavior:'smooth'});
}

async function switchEp(i){
  currentEpIdx=i;
  const ep=currentEpisodes[i];
  const title=currentAnime?.title?.english||currentAnime?.title?.romaji||'';
  document.getElementById('watchEpLabel').textContent=`Episode ${ep.number||i+1}${ep.title?' — '+ep.title:''}`;
  document.getElementById('watchBreadcrumb').textContent=title+' › Episode '+(ep.number||i+1);
  document.getElementById('sourcePickerArea').innerHTML='';
  document.querySelectorAll('.ep-row').forEach((r,ri)=>r.classList.toggle('current',ri===i));
  const cur=document.getElementById('eprow'+i);
  if(cur)cur.scrollIntoView({block:'nearest',behavior:'smooth'});
  await loadStream(ep.id);
}

async function loadStream(epId){
  const overlay=document.getElementById('playerOverlay');
  const msg=document.getElementById('playerMsg');
  overlay.classList.remove('hidden');
  msg.textContent='Finding stream...';
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
  const video=document.getElementById('videoPlayer');
  video.pause();
  video.removeAttribute('src');
  try{
    const data=await consumetWatch(epId);
    if(!data||!data.sources?.length)throw new Error('No sources found');
    const sources=data.sources;
    const m3u8=sources.find(s=>s.url?.includes('.m3u8'))||sources[0];
    if(!m3u8)throw new Error('No playable source');
    playSource(m3u8.url,sources,data.headers);
  }catch(e){
    overlay.classList.remove('hidden');
    msg.textContent='Stream unavailable for this episode';
    document.getElementById('sourcePickerArea').innerHTML=`
      <div style="margin-top:12px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Could not load stream automatically</div>
        <button class="btn-r" style="padding:8px 18px;font-size:12px" onclick="window.open('https://anikai.to','_blank')">▶ Try AnimeKai</button>
      </div>
    `;
  }
}

function playSource(url,allSources,headers){
  const video=document.getElementById('videoPlayer');
  const overlay=document.getElementById('playerOverlay');
  if(Hls.isSupported()&&url.includes('.m3u8')){
    hlsInstance=new Hls({
      maxBufferLength:30,
      maxMaxBufferLength:60,
      xhrSetup:(xhr)=>{if(headers?.Referer)xhr.setRequestHeader('Referer',headers.Referer);}
    });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{
      overlay.classList.add('hidden');
      video.play().catch(()=>{});
    });
    hlsInstance.on(Hls.Events.ERROR,(ev,data)=>{
      if(data.fatal){
        overlay.classList.remove('hidden');
        document.getElementById('playerMsg').textContent='Playback error — try another quality';
        renderSourcePicker(allSources);
      }
    });
  }else if(video.canPlayType('application/vnd.apple.mpegurl')&&url.includes('.m3u8')){
    video.src=url;
    video.addEventListener('loadedmetadata',()=>{overlay.classList.add('hidden');video.play().catch(()=>{});},{once:true});
  }else{
    video.src=url;
    video.addEventListener('canplay',()=>{overlay.classList.add('hidden');video.play().catch(()=>{});},{once:true});
  }
  renderSourcePicker(allSources);
}

function renderSourcePicker(sources){
  if(!sources||sources.length<=1)return;
  const sp=document.getElementById('sourcePickerArea');
  sp.innerHTML=`<div style="margin-top:12px"><div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Quality</div><div style="display:flex;gap:6px;flex-wrap:wrap">${sources.map((s,i)=>`<button onclick="switchSource('${esc(s.url)}')" style="padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">${esc(s.quality||('Source '+(i+1)))}</button>`).join('')}</div></div>`;
}

function switchSource(url){
  const video=document.getElementById('videoPlayer');
  const overlay=document.getElementById('playerOverlay');
  overlay.classList.remove('hidden');
  document.getElementById('playerMsg').textContent='Switching quality...';
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
  if(Hls.isSupported()&&url.includes('.m3u8')){
    hlsInstance=new Hls();
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{overlay.classList.add('hidden');video.play().catch(()=>{});});
  }else{
    video.src=url;
    video.addEventListener('canplay',()=>{overlay.classList.add('hidden');video.play().catch(()=>{});},{once:true});
  }
}

async function loadHome(){
  try{
    const d=await anilistQuery(TREND_QUERY,{page:1});
    const list=d?.Page?.media||[];
    setHero(list);
    document.getElementById('trendingGrid').innerHTML=list.slice(0,10).map(a=>animeCard(a)).join('');
    lastUpdated=new Date();
    updateBadge();
  }catch(e){document.getElementById('trendingGrid').innerHTML='<div class="error-box" style="grid-column:1/-1"><div class="error-icon">⚠️</div><h3>Failed to load</h3><p>Check your connection and refresh</p></div>';}

  try{
    await sleep(350);
    const {season,year}=getSeason();
    const d=await anilistQuery(SEASON_QUERY,{season,year});
    document.getElementById('seasonGrid').innerHTML=(d?.Page?.media||[]).slice(0,10).map(a=>animeCard(a)).join('');
  }catch(e){}

  try{
    await sleep(350);
    const d=await anilistQuery(POP_QUERY,{page:1});
    document.getElementById('popularGrid').innerHTML=(d?.Page?.media||[]).slice(0,10).map(a=>animeCard(a)).join('');
  }catch(e){}

  try{
    await sleep(350);
    const d=await anilistQuery(TOP_QUERY,{page:1});
    document.getElementById('topRatedList').innerHTML=(d?.Page?.media||[]).slice(0,10).map((a,i)=>rankItem(a,i)).join('');
  }catch(e){}

  loadSchedule();
}

async function loadSchedule(){
  try{
    const days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    const today=days[new Date().getDay()];
    const d=await jikanGet(`/schedules/${today}?limit=20`);
    const items=d?.data||[];
    document.getElementById('schedList').innerHTML=items.length?items.map(a=>{
      const airTime=a.broadcast?.time||'??:??';
      const ep=a.episodes||'?';
      return `<div class="sched-item" onclick="openDetail(${a.mal_id})">
        <div class="sched-time">${airTime}</div>
        <div>
          <div class="sched-name">${esc(a.title)}</div>
          <div class="sched-ep">${ep} eps</div>
        </div>
      </div>`;
    }).join(''):'<div style="padding:12px;font-size:13px;color:var(--muted)">No schedule data</div>';
  }catch(e){
    document.getElementById('schedList').innerHTML='<div style="padding:12px;font-size:13px;color:var(--muted)">Schedule unavailable</div>';
  }
}

function updateBadge(){
  if(!lastUpdated)return;
  const el=document.getElementById('updatedBadge');
  const diff=Math.floor((Date.now()-lastUpdated)/60000);
  el.textContent=diff<1?'Updated just now':`Updated ${diff}m ago`;
}

async function autoRefresh(){
  await loadHome();
}

function init(){
  buildNav();
  loadHome();
  setInterval(autoRefresh,REFRESH_MS);
  setInterval(updateBadge,60000);
}

init();
</script>
